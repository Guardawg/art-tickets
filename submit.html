<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<meta name="theme-color" content="#4a0000"/>
<title>Art Dept IT — Submit a Ticket</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Source+Sans+3:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
:root{
  --maroon:#4a0000;
  --maroon2:#6b0000;
  --maroon3:#8b1a1a;
  --gold:#c9a227;
  --gold2:#e8c44a;
  --gold3:#f5d978;
  --cream:#fdf8f0;
  --cream2:#f5ede0;
  --text:#1a0a0a;
  --text2:#5a3a3a;
  --text3:#9a7a7a;
  --border:#ddd0c0;
  --white:#ffffff;
}
*{box-sizing:border-box;margin:0;padding:0}
html{min-height:100%;background:var(--maroon)}
body{
  font-family:'Source Sans 3',sans-serif;
  min-height:100vh;
  background:
    radial-gradient(ellipse at 0% 0%, rgba(201,162,39,.15) 0%, transparent 50%),
    radial-gradient(ellipse at 100% 100%, rgba(201,162,39,.1) 0%, transparent 50%),
    linear-gradient(160deg, #3a0000 0%, #4a0000 40%, #5a0a00 100%);
  display:flex;flex-direction:column;align-items:center;
  padding:0 16px 48px;
}

/* Decorative top bar */
.top-bar{
  width:100%;max-width:560px;
  height:4px;
  background:linear-gradient(90deg, var(--gold) 0%, var(--gold2) 50%, var(--gold) 100%);
  margin-bottom:0;
  box-shadow:0 0 20px rgba(201,162,39,.5);
}

.header{
  width:100%;max-width:560px;
  padding:32px 0 28px;
  text-align:center;
  border-bottom:1px solid rgba(201,162,39,.2);
  margin-bottom:32px;
}
.header-eyebrow{
  font-size:11px;letter-spacing:3px;text-transform:uppercase;
  color:var(--gold);font-weight:600;margin-bottom:12px;
  font-family:'Source Sans 3',sans-serif;
}
.header h1{
  font-family:'Playfair Display',serif;
  font-size:clamp(26px,5vw,38px);
  color:var(--cream);
  line-height:1.15;
  margin-bottom:10px;
}
.header h1 span{color:var(--gold2)}
.header-sub{
  font-size:14px;color:rgba(253,248,240,.6);
  font-weight:300;line-height:1.6;
}

/* Card */
.card{
  width:100%;max-width:560px;
  background:var(--cream);
  border-radius:16px;
  overflow:hidden;
  box-shadow:0 24px 60px rgba(0,0,0,.4), 0 0 0 1px rgba(201,162,39,.2);
}
.card-inner{padding:36px 36px 32px}

@media(max-width:480px){
  .card-inner{padding:24px 20px 24px}
}

.field{margin-bottom:22px}
.field:last-of-type{margin-bottom:0}

label{
  display:block;
  font-size:12px;font-weight:600;letter-spacing:.8px;text-transform:uppercase;
  color:var(--maroon);margin-bottom:7px;
}
label .req{color:var(--maroon3);margin-left:2px}

input,select,textarea{
  width:100%;
  padding:11px 14px;
  border:1.5px solid var(--border);
  border-radius:8px;
  font-size:15px;font-family:'Source Sans 3',sans-serif;
  color:var(--text);background:var(--white);
  outline:none;transition:border-color .2s,box-shadow .2s;
  -webkit-appearance:none;appearance:none;
}
input:focus,select:focus,textarea:focus{
  border-color:var(--maroon);
  box-shadow:0 0 0 3px rgba(74,0,0,.1);
}
input::placeholder,textarea::placeholder{color:var(--text3)}
textarea{resize:vertical;min-height:110px;line-height:1.6}

/* Select arrow */
.select-wrap{position:relative}
.select-wrap::after{
  content:'▾';position:absolute;right:14px;top:50%;transform:translateY(-50%);
  color:var(--maroon);pointer-events:none;font-size:14px;
}

.field-row{display:grid;grid-template-columns:1fr 1fr;gap:16px}
@media(max-width:420px){.field-row{grid-template-columns:1fr}}

.divider{
  height:1px;background:var(--border);
  margin:28px 0;
}

.submit-btn{
  width:100%;padding:15px;
  background:linear-gradient(135deg, var(--maroon) 0%, var(--maroon2) 100%);
  color:var(--cream);
  border:none;border-radius:10px;
  font-size:15px;font-weight:600;letter-spacing:.5px;
  font-family:'Source Sans 3',sans-serif;
  cursor:pointer;
  transition:transform .15s,box-shadow .15s,opacity .15s;
  box-shadow:0 4px 16px rgba(74,0,0,.35);
  display:flex;align-items:center;justify-content:center;gap:10px;
  margin-top:28px;
}
.submit-btn:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(74,0,0,.45)}
.submit-btn:active{transform:translateY(0);opacity:.9}
.submit-btn:disabled{opacity:.6;pointer-events:none}
.submit-btn .gold-star{color:var(--gold2);font-size:16px}

/* Success state */
.success{
  display:none;flex-direction:column;align-items:center;
  text-align:center;padding:48px 36px;
}
.success.show{display:flex}
.form-content.hide{display:none}
.success-icon{
  width:72px;height:72px;border-radius:50%;
  background:linear-gradient(135deg,var(--maroon),var(--maroon2));
  display:flex;align-items:center;justify-content:center;
  font-size:32px;margin-bottom:20px;
  box-shadow:0 8px 24px rgba(74,0,0,.3);
}
.success h2{
  font-family:'Playfair Display',serif;
  font-size:26px;color:var(--maroon);margin-bottom:10px;
}
.success p{font-size:15px;color:var(--text2);line-height:1.6;max-width:320px}
.success .ticket-num{
  margin-top:20px;padding:10px 20px;
  background:var(--maroon);color:var(--gold2);
  border-radius:8px;font-size:13px;font-family:monospace;letter-spacing:1px;
}
.submit-another{
  margin-top:20px;padding:10px 20px;
  background:none;border:1.5px solid var(--border);
  border-radius:8px;font-size:14px;color:var(--text2);
  cursor:pointer;font-family:'Source Sans 3',sans-serif;
  transition:border-color .15s,color .15s;
}
.submit-another:hover{border-color:var(--maroon);color:var(--maroon)}

/* Footer */
.footer{
  margin-top:24px;text-align:center;
  font-size:12px;color:rgba(253,248,240,.4);
  letter-spacing:.3px;
}
.footer span{color:var(--gold);opacity:.7}

/* Gold accent line on card top */
.card-accent{height:3px;background:linear-gradient(90deg,var(--gold) 0%,var(--gold2) 60%,transparent 100%)}

/* Spinner */
.spin{display:inline-block;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>

<div class="top-bar"></div>

<div class="header">
  <div class="header-eyebrow">Texas State University · Art Department</div>
  <h1>IT Support<br/><span>Ticket Request</span></h1>
  <div class="header-sub">Submit a tech issue and our support staff will respond promptly.</div>
</div>

<div class="card">
  <div class="card-accent"></div>
  <div class="card-inner">

    <div class="form-content" id="form-content">
      <div class="field-row">
        <div class="field">
          <label>Full Name <span class="req">*</span></label>
          <input type="text" id="f-name" placeholder="Jane Smith" autocomplete="name"/>
        </div>
        <div class="field">
          <label>Email <span class="req">*</span></label>
          <input type="email" id="f-email" placeholder="jsmith@txstate.edu" autocomplete="email"/>
        </div>
      </div>

      <div class="field-row">
        <div class="field">
          <label>Room / Location <span class="req">*</span></label>
          <input type="text" id="f-room" placeholder="e.g. FAB 210, Lab A"/>
        </div>
        <div class="field">
          <label>Device Type <span class="req">*</span></label>
          <div class="select-wrap">
            <select id="f-device">
              <option value="" disabled selected>Select device…</option>
              <option>Desktop Mac</option>
              <option>Desktop PC</option>
              <option>Laptop Mac</option>
              <option>Laptop PC</option>
              <option>Printer</option>
              <option>Projector / Display</option>
              <option>Scanner / Plotter</option>
              <option>Network / WiFi</option>
              <option>Software / Account</option>
              <option>Other</option>
            </select>
          </div>
        </div>
      </div>

      <div class="divider"></div>

      <div class="field">
        <label>Describe the Problem <span class="req">*</span></label>
        <textarea id="f-desc" placeholder="Please describe what's happening, any error messages you see, and when the issue started…"></textarea>
      </div>

      <button class="submit-btn" id="submit-btn">
        <span class="gold-star">✦</span>
        <span id="btn-text">Submit Ticket</span>
      </button>
    </div>

    <div class="success" id="success-panel">
      <div class="success-icon">✓</div>
      <h2>Ticket Submitted!</h2>
      <p>Thanks! Your request has been logged and our tech staff will be in touch soon.</p>
      <div class="ticket-num" id="ticket-num">TICKET #—</div>
      <button class="submit-another" id="submit-another">Submit another issue</button>
    </div>

  </div>
</div>

<div class="footer">
  Art Department IT Support · <span>Texas State University</span>
</div>

<script>
// -------------------------------------------------------
// PASTE YOUR APPS SCRIPT URL HERE:
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzDcudrO5161VLLBjKPN0ZL6CuDV3MNhThStjxgWmLFIlPcR9x89BdG48dqQFWfgh2_/exec';
// -------------------------------------------------------

let ticketCount = Date.now() % 100000;

document.getElementById('submit-btn').addEventListener('click', async () => {
  const name = document.getElementById('f-name').value.trim();
  const email = document.getElementById('f-email').value.trim();
  const room = document.getElementById('f-room').value.trim();
  const device = document.getElementById('f-device').value;
  const desc = document.getElementById('f-desc').value.trim();

  if (!name || !email || !room || !device || !desc) {
    alert('Please fill in all fields before submitting.');
    return;
  }

  const btn = document.getElementById('submit-btn');
  const btnText = document.getElementById('btn-text');
  btn.disabled = true;
  btnText.innerHTML = '<span class="spin">⟳</span> Submitting…';

  const ticketId = ++ticketCount;
  const ticket = {
    id: ticketId,
    title: `${device} issue — ${room}`,
    desc: desc,
    priority: 'medium',
    category: deviceToCategory(device),
    requester: `${name} (${email})`,
    status: 'Open',
    created: new Date().toLocaleString(),
    updated: new Date().toLocaleString(),
    room: room,
    email: email
  };

  try {
    if (SCRIPT_URL && SCRIPT_URL !== 'YOUR_APPS_SCRIPT_URL_HERE') {
      await fetch(SCRIPT_URL, {
        method: 'POST',
        mode: 'no-cors',
        headers: { 'Content-Type': 'text/plain' },
        body: JSON.stringify({ action: 'upsert', ticket })
      });
    }
    showSuccess(ticketId);
  } catch (e) {
    showSuccess(ticketId); // still show success — offline queue could be added
  }
});

function deviceToCategory(device) {
  if (!device) return 'other';
  const d = device.toLowerCase();
  if (d.includes('printer') || d.includes('scanner') || d.includes('plotter')) return 'printer';
  if (d.includes('network') || d.includes('wifi')) return 'network';
  if (d.includes('software') || d.includes('account')) return 'software';
  if (d.includes('projector') || d.includes('display')) return 'hardware';
  if (d.includes('mac') || d.includes('pc') || d.includes('laptop')) return 'hardware';
  return 'other';
}

function showSuccess(id) {
  document.getElementById('form-content').classList.add('hide');
  document.getElementById('success-panel').classList.add('show');
  document.getElementById('ticket-num').textContent = `TICKET #${String(id).padStart(5,'0')}`;
}

document.getElementById('submit-another').addEventListener('click', () => {
  document.getElementById('form-content').classList.remove('hide');
  document.getElementById('success-panel').classList.remove('show');
  document.getElementById('f-name').value = '';
  document.getElementById('f-email').value = '';
  document.getElementById('f-room').value = '';
  document.getElementById('f-device').value = '';
  document.getElementById('f-desc').value = '';
  document.getElementById('submit-btn').disabled = false;
  document.getElementById('btn-text').textContent = 'Submit Ticket';
});
</script>
</body>
</html>
