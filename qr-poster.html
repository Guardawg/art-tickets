<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8"/>
<title>QR Poster — Art Dept IT</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Source+Sans+3:wght@400;600&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#fff;display:flex;justify-content:center;padding:40px 20px;font-family:'Source Sans 3',sans-serif}
.poster{
  width:420px;
  background:#4a0000;
  border-radius:12px;
  overflow:hidden;
  box-shadow:0 8px 32px rgba(0,0,0,.3);
}
.gold-bar{height:8px;background:linear-gradient(90deg,#c9a227,#e8c44a,#c9a227)}
.poster-body{padding:36px 32px 32px;text-align:center}
.eyebrow{font-size:11px;letter-spacing:3px;text-transform:uppercase;color:#c9a227;font-weight:600;margin-bottom:12px}
h1{font-family:'Playfair Display',serif;font-size:34px;color:#fdf8f0;line-height:1.2;margin-bottom:6px}
h1 span{color:#e8c44a}
.subtitle{font-size:15px;color:rgba(253,248,240,.6);margin-bottom:24px;font-weight:300}
.divider{height:1px;background:rgba(201,162,39,.3);margin-bottom:24px}
.qr-wrap{
  background:#fdf8f0;
  border-radius:12px;
  padding:20px;
  display:inline-block;
  margin-bottom:24px;
}
#qrcode canvas{display:block}
.scan-text{font-size:15px;color:#c9a227;font-weight:600;margin-bottom:8px}
.url-text{font-size:12px;color:rgba(253,248,240,.5);word-break:break-all;line-height:1.5}
.footer-bar{height:6px;background:linear-gradient(90deg,#c9a227,#e8c44a,#c9a227);margin-top:28px}
.txstate{font-size:12px;color:rgba(253,248,240,.35);margin-top:16px;letter-spacing:1px;text-transform:uppercase}
@media print{
  body{background:#fff;padding:0}
  .poster{box-shadow:none;border-radius:0;width:100%}
}
</style>
</head>
<body>
<div class="poster">
  <div class="gold-bar"></div>
  <div class="poster-body">
    <div class="eyebrow">Texas State University</div>
    <h1>Art Dept<br/><span>IT Support</span></h1>
    <div class="subtitle">Having a tech issue? Submit a ticket!</div>
    <div class="divider"></div>
    <div class="qr-wrap">
      <div id="qrcode"></div>
    </div>
    <div class="scan-text">📱 Scan to submit a ticket</div>
    <div class="url-text" id="url-display"></div>
    <div class="txstate">Art Department · IT Support</div>
  </div>
  <div class="footer-bar"></div>
</div>
<script>
// UPDATE THIS URL after uploading to GitHub
const SUBMIT_URL = 'https://guardawg.github.io/art-tickets/submit.html';
document.getElementById('url-display').textContent = SUBMIT_URL;
new QRCode(document.getElementById('qrcode'), {
  text: SUBMIT_URL,
  width: 220,
  height: 220,
  colorDark: '#4a0000',
  colorLight: '#fdf8f0',
  correctLevel: QRCode.CorrectLevel.H
});
</script>
</body>
</html>
